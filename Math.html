<html>
<head>
    <title>JavaScript Math Object Methods</title>
</head>
<body>

<script type="text/javascript">
    var value;

    value = Math.abs(20);
    document.write("Demo Test Value : " + value);
    document.write("<br>");

    value = Math.acos(-1);
    document.write("Demo Test Value : " + value);
    document.write("<br>");

    value = Math.asin(1);
    document.write("Demo Test Value : " + value);
    document.write("<br>");

    value = Math.atan(0.5);
    document.write("Demo Test Value : " + value);
    document.write("<br>");
</script>
</body>
</html>
