<html>
    <body>
        <h2>JavaScript for loops</h2>
        <p id = "demo"></p>
        <script>var fruits = ["Apple", "Mango", "Grapes",
        "WaterMelon", "jackfruit", "Banana",];
        var text = "";
        var i;
        for (i = 0; i<fruits.length; i++) {
            text += fruits[i] + "<br>";
        }
        document.getElementById("demo").innerHTML = text;</script>
    </body>
</html>
