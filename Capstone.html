<html>
    <head>
        <title>Navbar</title>
        <style>
     
body{
    font-family:Arial, Helvetica, sans-serif;
    background:#f4f7fc;
}

/* Navbar */
.topnav{
    overflow: hidden;
    background: linear-gradient(purple,violet);

}

.topnav a {
float: left;
color:aquamarine;
text-align: center;
padding: 14px 16px;
text-decoration: wavy;
font-size: 17px;

}

.topnav a:hover{
    background-color:linear-gradient(darkgreen,rgb(39, 229, 18)) ;
    color:black;
}
.topnav a.active{
    background-color:linear-gradient(darkblue,lightblue);
    color:black;
}
    
        </style>
        <body>
      <div class="topnav">
      <a class="active" href="#home">Home</a>
      <a href="#">About_us</a>
      <a href="#">Gallery</a>
      <a href="#">Contact_us</a>
      </div>
        </body>
    </head>
</html>
