<html>
<body>

    <h2>JavaScript Functions</h2>

    <p>Do a calculation and then display the result.</p>

    <p id="demo"></p>

    <script>
        function add(a, b) {
            return a + b;
        }

        function average(a, b) {
            var sum = add(a, b);
            return sum / 2;
        }

        var result = average(10, 20);

        document.getElementById("demo").innerHTML = result;
    </script>

</body>
</html>
