<html>
    <body>
        <center>
        <h2>Making a Digital Clock in JS</h2>
        <div id="MyClockDisplay" onload="showTime()"></div>
         <script>
            function showTime(){
              var date = new Date();
              var h = date.getHours();
              var m = date.getMinutes();
              var s = date.getSeconds();

              var session = "AM";

              if(h > 12){
                h = h - 12;
                session = "PM";
              }

              h = (h < 10) ? "0" + h : h;
              m = (m < 10) ? "0" + m : m;
              s = (s < 10) ? "0" + s : s;

              var time = h + ":" + m + ":" + s + " ";
              document.getElementById("MyClockDisplay").innerText = time;
              setTimeout(showTime, 1000);

            }
            
            showTime();
         </script>
        </center>
    </body>
</html>
