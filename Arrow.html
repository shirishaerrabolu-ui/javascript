<html>
    <body>
        <center>
            <h2>JavaScript Arrow Function</h2>
            <p>This example shows an arrow function with a parameter</p>
            <p id="result"></p>
            <script>
                const add = (a,b) => a+b;
                document.getElementById("result").innerHTML = add(14,56);
            </script>
        </center>
    </body>
</html>
