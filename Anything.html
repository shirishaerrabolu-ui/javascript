<style>
    body{
        font-family: sans-serif;
       background: aliceblue;
       text-align: center;
       padding: 30px;
    }

    h1{
        color:navy;
    }

    input {
        
        background:cyan;
        color:black;
        border:none;
        padding:12px 25px;
        font-size:18px;
        border-radius:8px;
        cursor:pointer;
        font-weight:bold;
    }

    button {
        background:cyan;
        color:black;
        border:none;
        padding:12px 25px;
        font-size:18px;
        border-radius:8px;
        cursor:pointer;
        font-weight:bold;
    }

    #timer {
      color:grey;  
    }
</style>

</head>
<body>
    <center>
        <h1>Lucky Draw</h1>
        <p>Enter your name and guess a number to win!</p>

        <input type="text" id="name" placeholder="Your Name" required><br>
        <p id="msg-name"></p>

        <input type="number" id="guess" placeholder="Guess a number(1 to 5)" required><br>
        <p id="msg-guess"></p>

        <button onclick="CheckForm()">Check My Form!</button>
        <p id="result"></p>
        <p id="timer"></p>

        <script>
            var seconds = 0;

setInterval(function() {

seconds = seconds + 1;

document.getElementById("timer").textContent = "You have been here for Π +

seconds + seconds!";

}, 1000);

function checkForm() {

var name = document.getElementById("name").value;

var guess = document.getElementById("guess").value;

var ok = true;

if (name == "") {

document.getElementById("msg-name").textContent = "Please enter your name!";

document.getElementById("msg-name").style.color = "red";

ok = false;

} else {

document.getElementById("msg-name").textContent = "Great name!";

document.getElementById("msg-name").style.color = "green";

}

if (guess == "") {

document.getElementById("msg-guess").textContent = "Please enter a guess!";

document.getElementById("msg-guess").style.color = "red";

ok = false;

} else {

document.getElementById("msg-guess").textContent = "Guess saved!";

document.getElementById("msg-guess").style.color = "green";

}

if (ok == true) {

var lucky Math.floor(Math.random() * 5) + 1;

if (guess == lucky) {

document.getElementById("result").textContent = "You win, + name + "!

The lucky number was + lucky + "!";

document.getElementById("result").style.color = "green";

} else {

document.getElementById("result").textContent = "So close, + name + "!

The lucky number was " + lucky + ". Try again!";

document.getElementById("result").style.color = "navy";

}

}

}
        </script>
    </center>
</body>
</html>
