<html>
    <body>
        <center>
            <h1>JavaScript String() Method</h1>
            <p>The String Method Converts a number to a string</p>
            <p id="result1"></p>
            <p id="result2"></p>

            <script>
                var x= 15
                var y=25
                document.getElementById("result1").innerHTML = x + y;
                document.getElementById("result2").innerHTML = String(x) + String(y);
            </script>

        </center>
    </body>
</html>
