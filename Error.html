<html>
    <body>
        <h2>JavaScript Error Handling</h2>
        <p>This example demonstrates how to use <b>Catch</b> Errors</p>
        <p id="error_message"></p>
        <script>
            try {
                addalert("Welcome Friends!")
            }
            catch(err) {
                document.getElementById("error_message").innerHTML = err.message;   
            }
        </script>
    </body>
</html>
