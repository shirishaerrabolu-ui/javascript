<!DOCTYPE html>
<html>
<body>

<h2>JavaScript Functions and Math Objects</h2>

<p>Sum of arguments:</p>
<p id="demo"></p>

<script>
// Function to calculate the sum of all arguments
function sumAll() {
    var sum = 0;

    for (var i = 0; i < arguments.length; i++) {
        sum += arguments[i];
    }

    return sum;
}

// Display the sum
document.getElementById("demo").innerHTML =
    sumAll(1, 123, 500, 115, 44, 88);

// Math Object Examples
document.write("<br><br><b>Math Functions:</b><br>");

var value = Math.sin(45);
document.write("Sin 45 is : " + value + "<br>");

var value1 = Math.cos(45);
document.write("Cos 45 is : " + value1 + "<br>");

var value2 = Math.tan(45);
document.write("Tan 45 is : " + value2 + "<br>");
</script>

</body>
</html>
