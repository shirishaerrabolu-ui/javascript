<!DOCTYPE html>
<html>
<head>
    <title>Perimeter Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #74ebd5, #ACB6E5);
            text-align: center;
            padding: 30px;
        }

        .container {
            background: white;
            width: 400px;
            margin: auto;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 0 10px gray;
        }

        h1 {
            color: #333;
        }

        input, select, button {
            width: 90%;
            padding: 10px;
            margin: 8px;
            font-size: 16px;
        }

        button {
            background: #007BFF;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background: #0056b3;
        }

        #result {
            font-size: 22px;
            color: green;
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Perimeter Calculator</h1>

    <select id="shape" onchange="showInputs()">
        <option value="">--Select Shape--</option>
        <option value="square">Square</option>
        <option value="rectangle">Rectangle</option>
        <option value="triangle">Triangle</option>
        <option value="circle">Circle</option>
    </select>

    <div id="inputs"></div>

    <button onclick="calculate()">Calculate Perimeter</button>

    <p id="result"></p>
</div>

<script>

function showInputs() {

    let shape = document.getElementById("shape").value;
    let inputs = document.getElementById("inputs");

    if(shape=="square"){
        inputs.innerHTML=
        `
        <input type="number" id="side" placeholder="Enter side length">
        `;
    }

    else if(shape=="rectangle"){
        inputs.innerHTML=
        `
        <input type="number" id="length" placeholder="Enter length">
        <input type="number" id="width" placeholder="Enter width">
        `;
    }

    else if(shape=="triangle"){
        inputs.innerHTML=
        `
        <input type="number" id="a" placeholder="Side 1">
        <input type="number" id="b" placeholder="Side 2">
        <input type="number" id="c" placeholder="Side 3">
        `;
    }

    else if(shape=="circle"){
        inputs.innerHTML=
        `
        <input type="number" id="radius" placeholder="Enter radius">
        `;
    }

    else{
        inputs.innerHTML="";
    }
}

function calculate(){

    let shape=document.getElementById("shape").value;
    let perimeter=0;

    if(shape=="square"){
        let side=parseFloat(document.getElementById("side").value);
        perimeter=4*side;
    }

    else if(shape=="rectangle"){
        let length=parseFloat(document.getElementById("length").value);
        let width=parseFloat(document.getElementById("width").value);
        perimeter=2*(length+width);
    }

    else if(shape=="triangle"){
        let a=parseFloat(document.getElementById("a").value);
        let b=parseFloat(document.getElementById("b").value);
        let c=parseFloat(document.getElementById("c").value);
        perimeter=a+b+c;
    }

    else if(shape=="circle"){
        let radius=parseFloat(document.getElementById("radius").value);
        perimeter=2*Math.PI*radius;
    }

    if(shape==""){
        document.getElementById("result").innerHTML="Please select a shape!";
    }
    else{
        document.getElementById("result").innerHTML=
        "Perimeter = "+perimeter.toFixed(2);
    }

}

</script>

</body>
</html>
