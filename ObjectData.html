<!DOCTYPE html>
<html>
<body>

<h2>JavaScript Objects Data Structure and Array</h2>

<script>
var student = {
    name: 'Riya',
    age: '12',
    Grade: '7',
    hobbies: 'Drawing',
    fav_sport: 'Cricket'
};

var color = ["white", "black", "red", "green", "blue"];

// Display student information
document.write(
    "Student name is : " + student.name +
    "<br>Student favorite sport is : " + student.fav_sport
);

// Display colors before pop()
document.write("<br><br>Before Poping the colors are : " + color.join("^"));

// Display favorite color
document.write("<br>My favorite color is : " + color[3]);

// Remove the last color
color.pop();

// Display colors after pop()
document.write("<br>After Poping the colors are : " + color.join("*"));
</script>

</body>
</html>
